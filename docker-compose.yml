# Local stack. Two common ways to run:
#   docker compose up -d db          # just Postgres+pgvector (set VECTOR_BACKEND=pgvector)
#   docker compose up --build api    # the API in a container (defaults to keyless mode)
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-numpy}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Inside the compose network the database's hostname is `db`, not
      # localhost. Start it first (docker compose up -d db) when using
      # VECTOR_BACKEND=pgvector.
      PG_DSN: ${PG_DSN:-postgresql://rag:rag@db:5432/rag}
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
