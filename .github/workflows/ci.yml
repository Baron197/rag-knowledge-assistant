name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
      VECTOR_BACKEND: numpy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (keyless fake path)
        run: pytest -q

      # Retrieval-quality regression gate. Runs on the fake path (no API key),
      # so a PR that breaks retrieval fails CI before review.
      - name: Retrieval eval gate
        run: python -m eval.run_eval --no-ragas --min-recall 0.8
